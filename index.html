<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SOVEREIGN ENGINE - Runnur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    :root {
      --sov-green: #00ff41;
      --sov-purple: #bc13fe;
      --sov-dark: #050505;
      --sov-dim: #003b0f;
      --sov-font: 'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      color: var(--sov-green);
      font-family: var(--sov-font);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: fixed;
      top: 0;
      left: 0;
    }

    #sovContainerEl {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--sov-dark);
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    canvas {
      image-rendering: pixelated;
      width: 100%;
      flex-grow: 1;
      background: #000;
      display: block;
      contain: layout style paint;
      -webkit-touch-callout: none;
    }

    #hudEl {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      text-shadow: 0 0 5px var(--sov-green);
      font-size: 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      z-index: 10;
      contain: layout style paint;
    }

    .hud-stat { display: flex; flex-direction: column; }
    .hud-label { font-size: 12px; color: var(--sov-purple); margin-bottom: 2px; }
    .hud-value { font-weight: bold; }

    #controlsEl {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      border-top: 2px solid var(--sov-dim);
      background: #0a0a0a;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-around;
      padding: 10px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 20;
      contain: layout style paint;
    }

    button {
      background: var(--sov-dark);
      color: var(--sov-green);
      border: 2px solid var(--sov-green);
      padding: 20px 40px;
      font-family: var(--sov-font);
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.1s;
      border-radius: 8px;
      width: 45%;
      height: 80px;
      -webkit-appearance: none;
      appearance: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button:active, button:focus {
      background: var(--sov-green);
      color: var(--sov-dark);
      box-shadow: 0 0 20px var(--sov-green);
      transform: scale(0.98);
      outline: none;
    }

    button:disabled {
      border-color: #333;
      color: #333;
      cursor: not-allowed;
      background: #000;
      box-shadow: none;
      transform: none;
    }

    #rebootBtn {
      width: auto;
      height: 30px;
      padding: 5px 15px;
      font-size: 12px;
      margin-top: 10px;
      background: #220022;
      border-color: var(--sov-purple);
      color: var(--sov-purple);
    }

    #modalOverlayEl {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      overflow-y: auto;
      contain: layout style paint;
    }

    h1 {
      color: var(--sov-green);
      text-shadow: 0 0 10px var(--sov-green);
      margin-bottom: 10px;
      font-size: 28px;
    }

    .modal-status-text {
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--sov-purple);
      line-height: 1.6;
    }

    .modal-status-text span {
      font-size: 12px;
      color: var(--sov-green);
      display: block;
    }

    .card-ingest-section {
      margin-top: 30px;
      border-top: 1px solid var(--sov-dim);
      padding-top: 10px;
      width: 100%;
      max-width: 400px;
    }

    #cardPreviewEl {
      width: 100px;
      height: 100px;
      border: 2px dashed var(--sov-purple);
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sov-purple);
      font-size: 12px;
      border-radius: 8px;
    }

    input[type="file"] { display: none; }

    .scanline {
      width: 100%;
      height: 100%;
      position: fixed;
      left: 0;
      top: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 50;
      contain: layout style paint;
    }

    #flashOverlayEl {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--sov-purple);
      opacity: 0;
      pointer-events: none;
      z-index: 90;
      transition: opacity 0.05s;
    }

    #chargeIndicatorEl {
      position: fixed;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 10px;
      border: 2px solid var(--sov-purple);
      background: rgba(0,0,0,0.8);
      border-radius: 5px;
      overflow: hidden;
      z-index: 15;
      display: none;
      contain: layout style paint;
    }

    #chargeBarEl {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--sov-green), var(--sov-purple));
      transition: width 0.05s linear;
    }

    #chargeTextEl {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--sov-purple);
      white-space: nowrap;
    }

    #milestoneEl {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: var(--sov-purple);
      text-shadow: 0 0 10px var(--sov-purple);
      z-index: 80;
      display: none;
      animation: milestonePulse 2s ease-out forwards;
      pointer-events: none;
    }

    @keyframes milestonePulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }

    #uploadBtn {
      font-size: 14px;
      padding: 15px 30px;
      width: auto;
    }

    @media (max-height: 500px) {
      #controlsEl {
        height: 110px;
        padding-bottom: max(5px, env(safe-area-inset-bottom));
      }
      button {
        height: 60px;
        padding: 15px 30px;
        font-size: 14px;
      }
    }

    @media (max-width: 320px) {
      h1 { font-size: 20px; }
      button { font-size: 14px; width: 48%; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="sovContainerEl">
    <div class="scanline"></div>
    
    <div id="hudEl">
      <div class="hud-stat">
        <span class="hud-label">YARDS</span>
        <span id="scoreValEl" class="hud-value">0</span>
      </div>
      <div class="hud-stat" style="text-align:center">
        <span class="hud-label">DIFFICULTY</span>
        <span id="diffValEl" class="hud-value">1.0x</span>
      </div>
      <div class="hud-stat" style="text-align:right">
        <span class="hud-label">HIGH YDS</span>
        <span id="highScoreValEl" class="hud-value">0</span>
      </div>
    </div>

    <canvas id="gameCanvasEl"></canvas>

    <div id="milestoneEl">HEX MILESTONE UNLOCKED!</div>

    <div id="chargeIndicatorEl">
      <div id="chargeTextEl">CHARGING...</div>
      <div id="chargeBarEl"></div>
    </div>

    <div id="flashOverlayEl" class="hidden"></div>

    <div id="controlsEl">
      <button id="leftBtn" aria-label="Drift Left">&lt;&lt; DRIFT L</button>
      <button id="rightBtn" aria-label="Drift Right">DRIFT R &gt;&gt;</button>
    </div>

    <div id="modalOverlayEl">
      <h1>SOVEREIGN ENGINE</h1>
      <div class="modal-status-text">
        SULTAN 47 PROTOCOL INITIALIZED<br>
        LOADING LATTICE ARCHITECTURE...<br>
        <span>OBSTACLE SYSTEM: ONLINE</span>
        <span>PERSISTENCE LAYER: READY</span>
        <span>WEB AUDIO API: ACTIVE</span>
      </div>
      
      <button id="startBtn">INITIALIZE SYSTEM</button>
      <button id="rebootBtn">REBOOT SYSTEM</button>
      
      <div class="card-ingest-section">
        <div class="hud-label">GAME STATS</div>
        <div id="statsDisplayEl" style="font-size:12px; color:#888; margin:10px 0;">
          <div id="statsTextEl">Loading career data...</div>
        </div>
        <button id="resetStatsBtn" style="font-size:12px; padding:10px 20px; width:auto; margin-top:10px;">RESET STATS</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.177.0";

    // ===== CLASSES =====

    class SovereignAudio {
      constructor() {
        this.audioContext = null;
        this.masterGain = null;
        this.oscillators = [];
        this.soundEnabled = true;
        this.musicVolume = 0.3;
        this.sfxVolume = 0.5;
      }

      async init() {
        try {
          this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
          this.masterGain = this.audioContext.createGain();
          this.masterGain.connect(this.audioContext.destination);
          this.masterGain.gain.value = 0.7;
          console.log('[Audio] Web Audio API initialized');
          return true;
        } catch (error) {
          console.warn('[Audio] Failed to initialize:', error);
          this.soundEnabled = false;
          return false;
        }
      }

      playCollisionSFX() {
        if (!this.soundEnabled || !this.audioContext) return;
        try {
          const now = this.audioContext.currentTime;
          const gainNode = this.audioContext.createGain();
          const oscillator = this.audioContext.createOscillator();
          
          oscillator.frequency.setValueAtTime(150, now);
          oscillator.frequency.exponentialRampToValueAtTime(50, now + 0.1);
          gainNode.gain.setValueAtTime(this.sfxVolume, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
          
          oscillator.connect(gainNode);
          gainNode.connect(this.masterGain);
          oscillator.start(now);
          oscillator.stop(now + 0.2);
        } catch (error) {}
      }

      playFireSFX(isCharged = false) {
        if (!this.soundEnabled || !this.audioContext) return;
        try {
          const now = this.audioContext.currentTime;
          const gainNode = this.audioContext.createGain();
          const oscillator = this.audioContext.createOscillator();
          
          if (isCharged) {
            oscillator.frequency.setValueAtTime(400, now);
            oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.15);
            gainNode.gain.setValueAtTime(this.sfxVolume, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
          } else {
            oscillator.frequency.setValueAtTime(300, now);
            oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.05);
            gainNode.gain.setValueAtTime(this.sfxVolume * 0.7, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          }
          
          oscillator.connect(gainNode);
          gainNode.connect(this.masterGain);
          oscillator.start(now);
          oscillator.stop(now + (isCharged ? 0.15 : 0.05));
        } catch (error) {}
      }

      playMilestoneSFX() {
        if (!this.soundEnabled || !this.audioContext) return;
        try {
          const now = this.audioContext.currentTime;
          const frequencies = [523.25, 659.25, 783.99]; // C5, E5, G5
          
          frequencies.forEach((freq, index) => {
            const delay = index * 0.08;
            const gainNode = this.audioContext.createGain();
            const oscillator = this.audioContext.createOscillator();
            
            oscillator.frequency.setValueAtTime(freq, now + delay);
            gainNode.gain.setValueAtTime(this.sfxVolume * 0.6, now + delay);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + delay + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(this.masterGain);
            oscillator.start(now + delay);
            oscillator.stop(now + delay + 0.3);
          });
        } catch (error) {}
      }

      playGameOverSFX() {
        if (!this.soundEnabled || !this.audioContext) return;
        try {
          const now = this.audioContext.currentTime;
          const frequencies = [440, 392, 349.23]; // A4, G4, F4
          
          frequencies.forEach((freq, index) => {
            const delay = index * 0.15;
            const gainNode = this.audioContext.createGain();
            const oscillator = this.audioContext.createOscillator();
            
            oscillator.frequency.setValueAtTime(freq, now + delay);
            gainNode.gain.setValueAtTime(this.sfxVolume * 0.8, now + delay);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + delay + 0.4);
            
            oscillator.connect(gainNode);
            gainNode.connect(this.masterGain);
            oscillator.start(now + delay);
            oscillator.stop(now + delay + 0.4);
          });
        } catch (error) {}
      }

      toggleSound(enabled) {
        this.soundEnabled = enabled;
        if (this.masterGain) {
          this.masterGain.gain.value = enabled ? 0.7 : 0;
        }
      }

      setVolume(volume) {
        if (this.masterGain) {
          this.masterGain.gain.value = Math.max(0, Math.min(1, volume));
        }
      }
    }

    class CareerStack {
      constructor(gameId = 'sovereign-engine') {
        this.gameId = gameId;
        this.STORAGE_KEYS = {
          HIGH_SCORE: `${gameId}-highscore`,
          TOTAL_YARDS: `${gameId}-total-yards`,
          GAMES_PLAYED: `${gameId}-games-played`,
          MILESTONES: `${gameId}-milestones`,
          ACHIEVEMENTS: `${gameId}-achievements`
        };
        this.data = {
          highScore: 0,
          totalYards: 0,
          gamesPlayed: 0,
          milestones: [],
          achievements: {}
        };
        this.loadData();
      }

      loadData() {
        try {
          this.data = {
            highScore: this.getLocalStorage(this.STORAGE_KEYS.HIGH_SCORE, 0),
            totalYards: this.getLocalStorage(this.STORAGE_KEYS.TOTAL_YARDS, 0),
            gamesPlayed: this.getLocalStorage(this.STORAGE_KEYS.GAMES_PLAYED, 0),
            milestones: this.getLocalStorage(this.STORAGE_KEYS.MILESTONES, []),
            achievements: this.getLocalStorage(this.STORAGE_KEYS.ACHIEVEMENTS, {})
          };
          console.log('[CareerStack] Data loaded:', this.data);
        } catch (error) {
          console.warn('[CareerStack] Load failed:', error);
        }
      }

      saveSession(score, yards) {
        try {
          if (score > this.data.highScore) {
            this.data.highScore = score;
            this.setLocalStorage(this.STORAGE_KEYS.HIGH_SCORE, score);
          }
          this.data.totalYards += yards;
          this.setLocalStorage(this.STORAGE_KEYS.TOTAL_YARDS, this.data.totalYards);
          this.data.gamesPlayed++;
          this.setLocalStorage(this.STORAGE_KEYS.GAMES_PLAYED, this.data.gamesPlayed);
          this.checkMilestones();
          console.log('[CareerStack] Session saved');
          return true;
        } catch (error) {
          console.warn('[CareerStack] Save failed:', error);
          return false;
        }
      }

      checkMilestones() {
        const hexMilestones = [31, 62, 93, 124, 155, 186];
        const colors = ['#00ff41', '#ff0055', '#ffff00', '#00ffff', '#ff00ff'];
        
        hexMilestones.forEach((milestone, index) => {
          if (this.data.gamesPlayed === milestone && !this.data.milestones.includes(milestone)) {
            this.data.milestones.push(milestone);
            this.setLocalStorage(this.STORAGE_KEYS.MILESTONES, this.data.milestones);
            console.log('[CareerStack] Milestone unlocked:', milestone);
          }
        });
      }

      getStats() {
        return {
          highScore: this.data.highScore,
          totalYards: this.data.totalYards,
          gamesPlayed: this.data.gamesPlayed,
          milestonesUnlocked: this.data.milestones.length
        };
      }

      resetAll() {
        try {
          Object.values(this.STORAGE_KEYS).forEach(key => localStorage.removeItem(key));
          this.loadData();
          console.log('[CareerStack] All data reset');
          return true;
        } catch (error) {
          console.warn('[CareerStack] Reset failed:', error);
          return false;
        }
      }

      setLocalStorage(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (error) {
          console.warn('[CareerStack] Storage quota exceeded:', error);
        }
      }

      getLocalStorage(key, defaultValue = null) {
        try {
          const value = localStorage.getItem(key);
          return value ? JSON.parse(value) : defaultValue;
        } catch (error) {
          console.warn('[CareerStack] Retrieve failed:', error);
          return defaultValue;
        }
      }
    }

    class ObstacleManager {
      constructor(scene, config) {
        this.scene = scene;
        this.config = config;
        this.obstacles = [];
        this.time = 0;
        this.waveNumber = 0;
        this.difficultyMultiplier = 1.0;
        this.spawnRate = 2.0;
        this.lastSpawnTime = 0;
      }

      update(deltaTime, playerPosition) {
        this.time += deltaTime;
        
        this.updateSpawnRate();
        this.attemptSpawn();
        
        for (let i = this.obstacles.length - 1; i >= 0; i--) {
          const obstacle = this.obstacles[i];
          obstacle.position.z += this.config.physics.obstacleBaseSpeed * this.difficultyMultiplier * deltaTime;
          
          if (obstacle.position.z > playerPosition.z + 10) {
            this.scene.remove(obstacle.mesh);
            this.obstacles.splice(i, 1);
          }
        }
        
        this.updateDifficulty();
      }

      attemptSpawn() {
        const timeSinceLastSpawn = this.time - this.lastSpawnTime;
        const spawnInterval = 1.0 / this.spawnRate;
        
        if (timeSinceLastSpawn >= spawnInterval) {
          this.spawn();
          this.lastSpawnTime = this.time;
        }
      }

      spawn() {
        const lane = Math.floor(Math.random() * this.config.physics.laneCount);
        const laneX = (lane - 2) * this.config.physics.laneWidth;
        const obstacleType = Math.random() < 0.7 ? 'box' : 'sphere';
        
        const obstacle = this.createObstacle(obstacleType, laneX);
        if (obstacle) {
          this.obstacles.push(obstacle);
        }
      }

      createObstacle(type, laneX) {
        let geometry, material, mesh;
        
        if (type === 'box') {
          geometry = new THREE.BoxGeometry(1, 1.5, 1);
          material = new THREE.MeshStandardMaterial({
            color: 0xff0055,
            roughness: 0.4,
            metalness: 0.6
          });
        } else {
          geometry = new THREE.SphereGeometry(0.7, 16, 16);
          material = new THREE.MeshStandardMaterial({
            color: 0xffff00,
            roughness: 0.3,
            metalness: 0.7,
            emissive: 0x333300
          });
        }
        
        mesh = new THREE.Mesh(geometry, material);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.position.set(laneX, 1, -50);
        mesh.rotation.z = Math.random() * Math.PI * 2;
        
        this.scene.add(mesh);
        
        return { mesh, type, position: mesh.position, geometry, active: true };
      }

      updateSpawnRate() {
        this.spawnRate = Math.min(5.0, 2.0 + this.time * 0.3);
      }

      updateDifficulty() {
        this.waveNumber = Math.floor(this.time / 30);
        this.difficultyMultiplier = 1.0 + this.waveNumber * 0.15;
      }

      checkCollision(playerPosition, playerRadius = 0.5) {
        for (let i = 0; i < this.obstacles.length; i++) {
          const obstacle = this.obstacles[i];
          const distance = playerPosition.distanceTo(obstacle.position);
          const minDistance = playerRadius + 0.7;
          
          if (distance < minDistance) {
            return { collided: true, obstacle, distance };
          }
        }
        
        return { collided: false };
      }

      clear() {
        this.obstacles.forEach(obs => this.scene.remove(obs.mesh));
        this.obstacles = [];
      }

      getDifficultyStats() {
        return {
          wave: this.waveNumber,
          multiplier: this.difficultyMultiplier.toFixed(2),
          spawnRate: this.spawnRate.toFixed(2),
          activeObstacles: this.obstacles.length
        };
      }
    }

    // ===== GAME STATE =====
    let gameStarted = false;
    let gameRunning = false;
    let camera, scene, renderer;
    let playerMesh, obstacleManager, audio, career;
    let playerLane = 2;
    let score = 0;
    let distance = 0;

    // ===== INITIALIZATION =====
    async function initializeGame() {
      if (gameStarted) return;
      gameStarted = true;
      gameRunning = true;

      const canvas = document.getElementById('gameCanvasEl');
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0xbc13fe, 20, 80);
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 15, 20);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.shadowMap.enabled = true;

      // Create player
      const playerGeometry = new THREE.BoxGeometry(1, 2, 1);
      const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff41 });
      playerMesh = new THREE.Mesh(playerGeometry, playerMaterial);
      playerMesh.position.set(0, 1, 0);
      playerMesh.castShadow = true;
      scene.add(playerMesh);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0x888888);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 10, 5);
      directionalLight.castShadow = true;
      scene.add(directionalLight);

      // Floor
      const floorGeometry = new THREE.PlaneGeometry(20, 100);
      const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x003b0f });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      floor.position.z = -50;
      floor.receiveShadow = true;
      scene.add(floor);

      // Initialize systems
      const CONFIG = {
        physics: {
          laneCount: 5,
          laneWidth: 2.0,
          playerSpeed: 0.35,
          obstacleBaseSpeed: 15.0
        }
      };

      obstacleManager = new ObstacleManager(scene, CONFIG);
      
      // Audio
      audio = new SovereignAudio();
      await audio.init();

      // Career
      career = new CareerStack('sovereign-engine');
      displayStats();

      document.getElementById('modalOverlayEl').classList.add('hidden');
      setupTouchControls();
      gameLoop(Date.now());
    }

    function setupTouchControls() {
      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');

      leftBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        playerLane = Math.max(0, playerLane - 1);
        audio.playCollisionSFX();
      });

      rightBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        playerLane = Math.min(4, playerLane + 1);
        audio.playCollisionSFX();
      });

      document.addEventListener('touchmove', (e) => {
        if (e.target.closest('#controlsEl')) {
          e.preventDefault();
        }
      }, { passive: false });
    }

    function gameLoop(currentTime) {
      requestAnimationFrame((time) => gameLoop(time));

      if (!gameRunning || !renderer) return;

      const deltaTime = 0.016; // 60 FPS

      // Update player position
      const laneWidth = 2.0;
      const laneX = (playerLane - 2) * laneWidth;
      playerMesh.position.x += (laneX - playerMesh.position.x) * 0.35;

      // Update obstacles
      obstacleManager.update(deltaTime, playerMesh.position);

      // Check collision
      const collision = obstacleManager.checkCollision(playerMesh.position);
      if (collision.collided) {
        gameRunning = false;
        audio.playGameOverSFX();
        career.saveSession(score, distance);
        
        setTimeout(() => {
          document.getElementById('modalOverlayEl').classList.remove('hidden');
          displayStats();
        }, 1000);
      }

      // Update distance and score
      distance += obstacleManager.difficultyMultiplier * deltaTime;
      score = Math.floor(distance);

      // Update HUD
      document.getElementById('scoreValEl').textContent = score;
      document.getElementById('diffValEl').textContent = obstacleManager.difficultyMultiplier.toFixed(1) + 'x';
      document.getElementById('highScoreValEl').textContent = career.data.highScore;

      // Check milestones
      if (career.data.milestones.length > 0 && score > 0 && score % 31 === 0) {
        audio.playMilestoneSFX();
        document.getElementById('milestoneEl').classList.remove('hidden');
        setTimeout(() => {
          document.getElementById('milestoneEl').classList.add('hidden');
        }, 2000);
      }

      renderer.render(scene, camera);
    }

    function displayStats() {
      const stats = career.getStats();
      const statsEl = document.getElementById('statsTextEl');
      statsEl.innerHTML = `
        HIGH SCORE: ${stats.highScore}<br>
        TOTAL YARDS: ${stats.totalYards.toFixed(0)}<br>
        GAMES PLAYED: ${stats.gamesPlayed}<br>
        MILESTONES: ${stats.milestonesUnlocked}
      `;
    }

    // ===== EVENT LISTENERS =====
    document.getElementById('startBtn').addEventListener('click', initializeGame);

    document.getElementById('rebootBtn').addEventListener('click', () => {
      location.reload();
    });

    document.getElementById('resetStatsBtn').addEventListener('click', () => {
      if (confirm('Reset all career data?')) {
        career.resetAll();
        displayStats();
      }
    });

    window.addEventListener('resize', () => {
      if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    });

    // ===== SERVICE WORKER =====
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('✅ Service Worker registered'))
        .catch(err => console.log('SW error:', err));
    }

    // Initial stats display
    displayStats();
  </script>
</body>
</html>
